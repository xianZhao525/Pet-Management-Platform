# ==========================================
# 服务器配置
# ==========================================
server.port=8080
server.servlet.session.timeout=30m

# ==========================================
# 数据库配置
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/pet_platform?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA 配置（如果使用JPA）
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ==========================================
# 静态资源配置（API服务不需要，但保留以防有上传文件等）
# ==========================================
spring.web.resources.static-locations=classpath:/static/,classpath:/public/
spring.web.resources.cache.period=3600

# ==========================================
# 应用配置
# ==========================================
app.admin.registration.code=123456

# ==========================================
# 日志配置
# ==========================================
logging.level.org.springframework.security=INFO
logging.level.com.example.backend=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.web.servlet=INFO